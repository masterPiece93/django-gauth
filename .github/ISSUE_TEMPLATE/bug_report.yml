name: 🐛 Bug Report
description: Report a problem with django-gauth
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! 🙏

        > ⚠️ **Security issues:** please do **not** report vulnerabilities here.
        > Follow our [Security Policy](../blob/main/SECURITY.md) instead.

        > 🔐 **Redact all secrets** in logs/config — never paste real client IDs,
        > client secrets, tokens, or authorization codes.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and this has not been reported yet.
          required: true
        - label: I am using a supported version of django-gauth.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a minimal repo) to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Visit '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include tracebacks if available (secrets redacted).
      render: shell
    validations:
      required: true
  - type: input
    id: gauth-version
    attributes:
      label: django-gauth version
      placeholder: e.g. 0.2.1
    validations:
      required: true
  - type: input
    id: django-version
    attributes:
      label: Django version
      placeholder: e.g. 4.2.26
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.3
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, macOS 14, Windows 11
    validations:
      required: false
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Relevant settings (SCOPE, redirect URLs, etc.). **Redact all secrets.**
      render: python
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help us understand the problem.
    validations:
      required: false
