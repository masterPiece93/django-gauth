name: ✨ Feature Request
description: Suggest an idea or enhancement for django-gauth
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! 💡

        Please check the [roadmap](https://github.com/masterPiece93/django-gauth) and existing
        issues first — your idea may already be planned or under discussion.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and this has not been requested yet.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the problem or limitation. Ex. "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Area
      description: Which part of the project does this relate to?
      options:
        - OAuth2 flow / views
        - Django auth / user integration
        - Configuration / settings
        - Documentation
        - Packaging / tooling
        - Other
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, examples, or screenshots about the feature request.
    validations:
      required: false
