name: tests

# CI / Quality Automation
# - lint:     vulture + ruff + isort + black + mypy using the project's *locked*
#             tool versions (via PDM) — same as local `pdm run lint` / `pdm run mypy`
# - test:     matrix of Python x Django, runs the Django test suite (runtests.py)
# - coverage: enforces a coverage threshold and publishes the coverage report
# - coverage-badge: generates a self-contained SVG badge (no external service)
#             and commits it to the `badges` branch on pushes to the default branch
#
# NOTE: lint pins versions through pdm.lock so CI matches local `pdm run ...`
#       results exactly (avoids tool-version drift breaking the build).

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  # Allow other workflows (e.g. release.yml) to require this one as a gate.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (vulture, ruff, isort, black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          python-version: "3.12"
          cache: true

      - name: Install lint dependencies (locked)
        run: pdm install -G lint --no-self

      - name: Lint (vulture + ruff + isort + black)
        run: pdm run lint

      - name: Mypy
        run: pdm run mypy

  test:
    name: Test (py${{ matrix.python-version }} / Django ${{ matrix.django-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0", "5.1", "5.2"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install "Django==${{ matrix.django-version }}.*"

      - name: Show resolved versions
        run: |
          python --version
          python -c "import django; print('Django', django.get_version())"

      - name: Run test suite
        env:
          # Dummy values: tests never contact Google; the OAuth flow is mocked
          # and the resource-intensive automation test is skipped (AUTOMATION=0).
          GOOGLE_CLIENT_ID: ci-dummy-client-id
          GOOGLE_CLIENT_SECRET: ci-dummy-client-secret
          AUTOMATION: "0"
        run: python runtests.py

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt

      - name: Run tests with coverage
        env:
          GOOGLE_CLIENT_ID: ci-dummy-client-id
          GOOGLE_CLIENT_SECRET: ci-dummy-client-secret
          AUTOMATION: "0"
        run: python runtests.py

      - name: Generate XML report and enforce threshold
        run: |
          python -m coverage xml
          # Current coverage is ~99%. Keep a strong floor; adjust if needed.
          python -m coverage report --fail-under=95

      - name: Upload coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  coverage-badge:
    name: Publish coverage badge
    needs: coverage
    runs-on: ubuntu-latest
    # Self-contained coverage badge (no external service): generate an SVG and
    # commit it to the `badges` branch. Only publishes on a direct push to the
    # default branch — skipped on PRs and on release `workflow_call`s (which run
    # with github.event_name != 'push').
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate coverage badge (SVG)
        run: |
          python -m pip install --upgrade pip
          pip install "genbadge[coverage]"
          genbadge coverage -i coverage.xml -o coverage.svg

      - name: Publish badge to the `badges` branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cp coverage.svg "${RUNNER_TEMP}/coverage.svg"
          cd "${RUNNER_TEMP}"
          AUTH_REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git clone --depth 1 --branch badges "${AUTH_REPO}" badges-repo 2>/dev/null; then
            echo "Updating existing 'badges' branch."
          else
            echo "Creating new orphan 'badges' branch."
            git clone --depth 1 "${AUTH_REPO}" badges-repo
            cd badges-repo
            git checkout --orphan badges
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi
          cp "${RUNNER_TEMP}/coverage.svg" badges-repo/coverage.svg
          cd badges-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          if git diff --staged --quiet; then
            echo "Coverage badge unchanged; nothing to commit."
          else
            git commit -m "ci: update coverage badge [skip ci]"
            git push origin badges
          fi
